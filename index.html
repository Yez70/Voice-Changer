<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Changer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Voice Changer</h1>
      <p class="subtitle">Transform your voice in real-time</p>
    </header>

    <div class="controls">
      <button id="startBtn" class="btn btn-primary">
        <span class="icon">&#9679;</span> Start Microphone
      </button>
      <button id="recordBtn" class="btn btn-record" disabled>
        <span class="icon">&#9210;</span> Record
      </button>
      <button id="stopRecordBtn" class="btn btn-stop" disabled style="display:none">
        <span class="icon">&#9632;</span> Stop Recording
      </button>
      <button id="monitorBtn" class="btn btn-monitor" disabled>
        &#127911; Monitor (Headphones)
      </button>
    </div>

    <p class="hint" id="hint">Tap Record to capture your changed voice. Enable Monitor only with headphones to hear yourself.</p>

    <div class="visualizer-container">
      <canvas id="visualizer" width="600" height="120"></canvas>
    </div>

    <div class="voice-grid" id="voiceGrid">
      <!-- Voice cards are generated by JS -->
    </div>

    <div class="playback-section" id="playbackSection" style="display:none">
      <h2>Recordings</h2>
      <div id="recordings"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
