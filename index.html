<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Changer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Voice Changer</h1>
      <p class="subtitle">Record your voice, then transform it</p>
    </header>

    <div class="controls">
      <button id="recordBtn" class="btn btn-record">
        <span class="icon">&#9679;</span> Hold to Record
      </button>
    </div>

    <p class="hint" id="status">Tap and hold the button to record your voice</p>

    <div class="visualizer-container">
      <canvas id="visualizer" width="600" height="120"></canvas>
    </div>

    <div id="playbackControls" style="display:none">
      <div class="playback-bar">
        <button id="playOriginal" class="btn btn-small">Play Original</button>
        <button id="downloadBtn" class="btn btn-small btn-download">Download</button>
      </div>
    </div>

    <div class="voice-grid" id="voiceGrid">
      <!-- Voice cards are generated by JS -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
